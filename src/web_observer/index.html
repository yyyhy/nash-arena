<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nash Arena Monitor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a24;
            --bg-elevated: #22222e;
            --text-primary: #e8e8ec;
            --text-secondary: #8888a0;
            --text-muted: #555566;
            --accent-gold: #d4af37;
            --accent-green: #22c55e;
            --accent-red: #ef4444;
            --accent-blue: #3b82f6;
            --accent-purple: #a855f7;
            --border-color: #2a2a3a;
            --shadow-glow: 0 0 40px rgba(212, 175, 55, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .app-container {
            display: grid;
            grid-template-columns: 280px 1fr;
            min-height: 100vh;
        }

        .sidebar {
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border-color);
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent-gold), #b8860b);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 18px;
            color: var(--bg-primary);
        }

        .logo-text {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .logo-text span {
            color: var(--accent-gold);
        }

        .nav-tabs {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .nav-tab {
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            text-align: left;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-tab:hover {
            background: var(--bg-card);
            color: var(--text-primary);
        }

        .nav-tab.active {
            background: var(--bg-card);
            color: var(--accent-gold);
            border: 1px solid var(--border-color);
        }

        .section-title {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        .room-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
            overflow-y: auto;
        }

        .room-item {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .room-item:hover {
            border-color: var(--accent-gold);
            transform: translateX(4px);
        }

        .room-item.active {
            border-color: var(--accent-gold);
            background: var(--bg-elevated);
            box-shadow: var(--shadow-glow);
        }

        .room-id {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: var(--accent-gold);
            margin-bottom: 6px;
        }

        .room-meta {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .room-phase {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .room-phase.in_progress { background: rgba(34, 197, 94, 0.2); color: var(--accent-green); }
        .room-phase.waiting { background: rgba(59, 130, 246, 0.2); color: var(--accent-blue); }
        .room-phase.finished { background: rgba(136, 136, 160, 0.2); color: var(--text-secondary); }

        .main-content {
            padding: 32px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
            font-family: inherit;
        }

        .btn-primary {
            background: var(--accent-gold);
            color: var(--bg-primary);
        }

        .btn-primary:hover {
            background: #c9a227;
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            border-color: var(--accent-gold);
        }

        .monitor-container {
            flex: 1;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .monitor-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .monitor-title {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .monitor-title h2 {
            font-size: 18px;
            font-weight: 600;
        }

        .game-badge {
            padding: 4px 12px;
            background: rgba(212, 175, 55, 0.15);
            color: var(--accent-gold);
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
        }

        .monitor-body {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
            gap: 16px;
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            opacity: 0.3;
        }

        .empty-state p {
            font-size: 14px;
        }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }

        .stat-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
        }

        .stat-value.gold { color: var(--accent-gold); }
        .stat-value.green { color: var(--accent-green); }
        .stat-value.blue { color: var(--accent-blue); }
        .stat-value.purple { color: var(--accent-purple); }
        .stat-value.red { color: var(--accent-red); }

        .refresh-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .refresh-indicator .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-green);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .player-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 16px;
            margin-top: 24px;
        }

        .player-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            position: relative;
            flex: 1 1 200px;
            max-width: 300px;
        }

        .player-card.current-turn {
            border-color: var(--accent-gold);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }

        .player-card.folded {
            opacity: 0.5;
        }

        .player-name {
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .player-name .dealer-btn {
            width: 20px;
            height: 20px;
            background: var(--accent-gold);
            color: var(--bg-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 700;
        }

        .player-chips {
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            color: var(--accent-gold);
        }

        .player-bet {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .player-cards {
            display: flex;
            gap: 6px;
            margin-top: 12px;
        }

        .card {
            width: 36px;
            height: 50px;
            background: linear-gradient(135deg, #fff 0%, #f0f0f0 100%);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            font-weight: 600;
            color: #1a1a1a;
        }

        .card.red { color: var(--accent-red); }
        .card.black { color: #1a1a1a; }
        .card.hidden { background: linear-gradient(135deg, #1a472a 0%, #0d2818 100%); }

        .community-cards {
            display: flex;
            justify-content: center;
            gap: 12px;
            padding: 24px;
            background: var(--bg-secondary);
            border-radius: 12px;
            margin: 24px 0;
        }

        .community-cards .card {
            width: 56px;
            height: 78px;
            font-size: 16px;
        }

        .pot-display {
            text-align: center;
            padding: 16px;
            background: rgba(212, 175, 55, 0.1);
            border-radius: 12px;
            margin-bottom: 24px;
        }

        .pot-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .pot-value {
            font-size: 36px;
            font-weight: 700;
            color: var(--accent-gold);
            font-family: 'JetBrains Mono', monospace;
        }

        .history-timeline {
            max-height: 200px;
            overflow-y: auto;
            border-top: 1px solid var(--border-color);
            padding-top: 16px;
            margin-top: 24px;
        }

        .history-item {
            display: flex;
            gap: 12px;
            padding: 8px 0;
            font-size: 13px;
            border-bottom: 1px solid var(--border-color);
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .history-player {
            font-weight: 600;
            min-width: 120px;
        }

        .history-action {
            color: var(--text-secondary);
        }

        .loading-spinner {
            width: 24px;
            height: 24px;
            border: 2px solid var(--border-color);
            border-top-color: var(--accent-gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Stats Page Styles */
        .stats-page {
            display: none;
        }

        .stats-page.active {
            display: block;
        }

        .search-box {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        .search-input {
            flex: 1;
            padding: 12px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent-gold);
        }

        .search-input::placeholder {
            color: var(--text-muted);
        }

        .game-select {
            padding: 12px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
            min-width: 150px;
        }

        .game-select:focus {
            outline: none;
            border-color: var(--accent-gold);
        }

        .player-stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .player-stat-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .player-stat-card .stat-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .player-stat-card .stat-value {
            font-size: 24px;
        }

        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
        }

        .leaderboard-table th,
        .leaderboard-table td {
            padding: 14px 16px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        .leaderboard-table th {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            font-weight: 600;
        }

        .leaderboard-table td {
            font-size: 14px;
        }

        .leaderboard-table tr:hover {
            background: var(--bg-elevated);
        }

        .rank-badge {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 12px;
        }

        .rank-badge.gold {
            background: linear-gradient(135deg, #d4af37, #b8860b);
            color: var(--bg-primary);
        }

        .rank-badge.silver {
            background: linear-gradient(135deg, #c0c0c0, #a0a0a0);
            color: var(--bg-primary);
        }

        .rank-badge.bronze {
            background: linear-gradient(135deg, #cd7f32, #a0522d);
            color: var(--bg-primary);
        }

        .rank-badge.default {
            background: var(--bg-elevated);
            color: var(--text-secondary);
        }

        .records-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .record-item {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .record-item:hover {
            border-color: var(--accent-gold);
        }

        .record-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .record-id {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--text-muted);
        }

        .record-result {
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
        }

        .record-result.win {
            background: rgba(34, 197, 94, 0.2);
            color: var(--accent-green);
        }

        .record-result.lose {
            background: rgba(239, 68, 68, 0.2);
            color: var(--accent-red);
        }

        .record-details {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            font-size: 13px;
        }

        .record-detail-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .record-detail-label {
            font-size: 11px;
            color: var(--text-muted);
        }

        .record-detail-value {
            font-weight: 600;
        }

        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 24px;
            background: var(--bg-secondary);
            padding: 4px;
            border-radius: 10px;
            width: fit-content;
        }

        .tab {
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            background: transparent;
            border: none;
            color: var(--text-secondary);
        }

        .tab:hover {
            color: var(--text-primary);
        }

        .tab.active {
            background: var(--bg-card);
            color: var(--accent-gold);
        }

        .sort-controls {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .sort-btn {
            padding: 8px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-secondary);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .sort-btn:hover {
            border-color: var(--accent-gold);
            color: var(--text-primary);
        }

        .sort-btn.active {
            border-color: var(--accent-gold);
            color: var(--accent-gold);
            background: rgba(212, 175, 55, 0.1);
        }

        @media (max-width: 768px) {
            .app-container {
                grid-template-columns: 1fr;
            }
            
            .sidebar {
                display: none;
            }
            
            .stats-bar {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon">N</div>
                <div class="logo-text">Nash <span>Arena</span></div>
            </div>
            
            <nav class="nav-tabs">
                <button class="nav-tab active" onclick="showPage('monitor')">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
                        <line x1="8" y1="21" x2="16" y2="21"/>
                        <line x1="12" y1="17" x2="12" y2="21"/>
                    </svg>
                    游戏监控
                </button>
                <button class="nav-tab" onclick="showPage('stats')">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="20" x2="18" y2="10"/>
                        <line x1="12" y1="20" x2="12" y2="4"/>
                        <line x1="6" y1="20" x2="6" y2="14"/>
                    </svg>
                    战绩统计
                </button>
                <button class="nav-tab" onclick="showPage('leaderboard')">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/>
                        <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/>
                        <path d="M4 22h16"/>
                        <path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/>
                        <path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/>
                        <path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/>
                    </svg>
                    排行榜
                </button>
            </nav>
            
            <div id="sidebarContent">
                <div class="section-title">Active Rooms</div>
                <div class="room-list" id="roomList">
                    <div class="empty-state">
                        <p>No active rooms</p>
                    </div>
                </div>
            </div>
        </aside>
        
        <main class="main-content">
            <!-- Monitor Page -->
            <div id="monitorPage" class="page active">
                <div class="header">
                    <h1>游戏监控</h1>
                    <div class="header-actions">
                        <div class="refresh-indicator">
                            <span class="dot"></span>
                            <span>Auto-refresh</span>
                        </div>
                        <button class="btn btn-secondary" onclick="refreshAll()">Refresh</button>
                    </div>
                </div>
                
                <div class="stats-bar" id="statsBar">
                    <div class="stat-card">
                        <div class="stat-label">Active Rooms</div>
                        <div class="stat-value blue" id="statRooms">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Total Players</div>
                        <div class="stat-value purple" id="statPlayers">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Games In Progress</div>
                        <div class="stat-value green" id="statInProgress">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Total Pots</div>
                        <div class="stat-value gold" id="statPots">0</div>
                    </div>
                </div>
                
                <div class="monitor-container" id="monitorContainer">
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                            <path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                        </svg>
                        <p>Select a room to view the game</p>
                    </div>
                </div>
            </div>

            <!-- Stats Page -->
            <div id="statsPage" class="page">
                <div class="header">
                    <h1>战绩统计</h1>
                </div>
                
                <div class="search-box">
                    <input type="text" class="search-input" id="playerIdInput" placeholder="输入玩家ID查询战绩...">
                    <select class="game-select" id="gameSelect">
                        <option value="">所有游戏</option>
                        <option value="texas_holdem">德州扑克</option>
                    </select>
                    <button class="btn btn-primary" onclick="searchPlayerStats()">查询</button>
                </div>
                
                <div id="playerStatsContainer" style="display: none;">
                    <div class="player-stats-grid" id="playerStatsGrid"></div>
                    
                    <div class="tabs">
                        <button class="tab active" onclick="showStatsTab('records')">历史记录</button>
                        <button class="tab" onclick="showStatsTab('details')">详细统计</button>
                    </div>
                    
                    <div id="recordsTab">
                        <div class="records-list" id="recordsList"></div>
                    </div>
                    
                    <div id="detailsTab" style="display: none;">
                        <div id="playerDetails"></div>
                    </div>
                </div>
            </div>

            <!-- Leaderboard Page -->
            <div id="leaderboardPage" class="page">
                <div class="header">
                    <h1>排行榜</h1>
                </div>
                
                <div class="search-box">
                    <select class="game-select" id="leaderboardGameSelect">
                        <option value="texas_holdem">德州扑克</option>
                    </select>
                    <button class="btn btn-primary" onclick="loadLeaderboard()">加载排行榜</button>
                </div>
                
                <div class="sort-controls">
                    <button class="sort-btn active" onclick="sortLeaderboard('wins')">按胜场</button>
                    <button class="sort-btn" onclick="sortLeaderboard('win_rate')">按胜率</button>
                    <button class="sort-btn" onclick="sortLeaderboard('net_chips')">按净赢筹码</button>
                </div>
                
                <div class="monitor-container">
                    <div class="monitor-body">
                        <table class="leaderboard-table">
                            <thead>
                                <tr>
                                    <th>排名</th>
                                    <th>玩家</th>
                                    <th>场次</th>
                                    <th>胜场</th>
                                    <th>胜率</th>
                                    <th>净赢筹码</th>
                                </tr>
                            </thead>
                            <tbody id="leaderboardBody">
                                <tr>
                                    <td colspan="6" style="text-align: center; color: var(--text-muted);">点击"加载排行榜"查看数据</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const API_BASE = ''; // Use relative path to support any port
        let selectedRoomId = null;
        let refreshInterval = null;
        let currentPage = 'monitor';
        let currentSortBy = 'wins';

        const GameMonitors = {
            texas_holdem: {
                render(state, uiConfig) {
                    return `
                        <div class="monitor-header">
                            <div class="monitor-title">
                                <h2>Texas Hold'em</h2>
                                <span class="game-badge">${state.betting_round || 'waiting'}</span>
                            </div>
                            <div class="room-id" style="font-family: 'JetBrains Mono', monospace; color: var(--text-secondary);">
                                ${state.room_id || ''}
                            </div>
                        </div>
                        <div class="monitor-body">
                            <div class="pot-display">
                                <div class="pot-label">Total Pot</div>
                                <div class="pot-value">${state.pot || 0}</div>
                            </div>
                            
                            <div class="community-cards">
                                ${renderCards(state.community_cards || [], false)}
                            </div>
                            
                            <div class="player-grid">
                                ${(state.players || []).map((p, i) => `
                                    <div class="player-card ${p.status === 'folded' ? 'folded' : ''} ${state.current_player_index === i ? 'current-turn' : ''}">
                                        <div class="player-name">
                                            ${p.is_dealer ? '<span class="dealer-btn" title="Dealer/Button">D</span>' : ''}
                                            <span style="overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 120px;" title="${p.id}">${p.id}</span>
                                            ${p.is_small_blind ? '<span style="font-size:10px;color:var(--text-muted);background:rgba(255,255,255,0.1);padding:2px 4px;border-radius:4px;">SB</span>' : ''}
                                            ${p.is_big_blind ? '<span style="font-size:10px;color:var(--text-muted);background:rgba(255,255,255,0.1);padding:2px 4px;border-radius:4px;">BB</span>' : ''}
                                        </div>
                                        <div class="player-chips">${p.chips} chips</div>
                                        <div class="player-bet">Bet: ${p.current_bet || 0}</div>
                                        <div class="player-cards">
                                            ${renderCards(p.hand || [], false)}
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                            
                            <div class="history-timeline" id="historyTimeline">
                                <div class="section-title">Action History</div>
                                ${(state.history || []).map(h => `
                                    <div class="history-item">
                                        <span class="history-action">${h}</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                }
            }
        };

        function renderCards(cards, hidden) {
            if (!cards || cards.length === 0) {
                return '<div style="color:var(--text-muted);font-size:12px;">No cards</div>';
            }
            
            return cards.map(card => {
                if (hidden) {
                    return '<div class="card hidden"></div>';
                }
                
                const [suit, rank] = card.split('-');
                const isRed = suit === 'H' || suit === 'D';
                const suitSymbol = {H: '♥', D: '♦', C: '♣', S: '♠'}[suit] || suit;
                
                return `<div class="card ${isRed ? 'red' : 'black'}">${rank}${suitSymbol}</div>`;
            }).join('');
        }

        async function fetchAPI(endpoint) {
            try {
                const response = await fetch(`${API_BASE}${endpoint}`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return await response.json();
            } catch (error) {
                console.error(`API Error: ${endpoint}`, error);
                return null;
            }
        }

        function showPage(page) {
            currentPage = page;
            
            document.querySelectorAll('.nav-tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            
            document.querySelector(`.nav-tab[onclick="showPage('${page}')"]`).classList.add('active');
            document.getElementById(`${page}Page`).classList.add('active');
            
            if (page === 'monitor') {
                document.getElementById('sidebarContent').innerHTML = `
                    <div class="section-title">Active Rooms</div>
                    <div class="room-list" id="roomList">
                        <div class="empty-state"><p>No active rooms</p></div>
                    </div>
                `;
                refreshAll();
            } else if (page === 'stats') {
                document.getElementById('sidebarContent').innerHTML = '';
            } else if (page === 'leaderboard') {
                document.getElementById('sidebarContent').innerHTML = '';
            }
        }

        async function refreshAll() {
            const roomsData = await fetchAPI('/monitor/rooms');
            
            if (roomsData && roomsData.rooms) {
                renderRoomList(roomsData.rooms);
                updateStats(roomsData.rooms);
            }
            
            if (selectedRoomId) {
                await refreshRoomState(selectedRoomId);
            }
        }

        function renderRoomList(rooms) {
            const container = document.getElementById('roomList');
            
            if (rooms.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>No active rooms</p></div>';
                return;
            }
            
            container.innerHTML = rooms.map(room => `
                <div class="room-item ${room.room_id === selectedRoomId ? 'active' : ''}" 
                     onclick="selectRoom('${room.room_id}')">
                    <div class="room-id">${room.room_id}</div>
                    <div class="room-meta">
                        <span>${room.players.length} players</span>
                        <span class="room-phase ${room.phase}">${room.phase}</span>
                    </div>
                </div>
            `).join('');
        }

        function updateStats(rooms) {
            document.getElementById('statRooms').textContent = rooms.length;
            
            const totalPlayers = rooms.reduce((sum, r) => sum + r.players.length, 0);
            document.getElementById('statPlayers').textContent = totalPlayers;
            
            const inProgress = rooms.filter(r => r.phase === 'in_progress').length;
            document.getElementById('statInProgress').textContent = inProgress;
        }

        async function selectRoom(roomId) {
            selectedRoomId = roomId;
            
            document.querySelectorAll('.room-item').forEach(el => {
                el.classList.toggle('active', el.querySelector('.room-id').textContent === roomId);
            });
            
            await refreshRoomState(roomId);
        }

        async function refreshRoomState(roomId) {
            const container = document.getElementById('monitorContainer');
            
            const data = await fetchAPI(`/monitor/room/${roomId}?show_hands=true`);
            
            if (!data) {
                // If room doesn't exist anymore, clear selection and refresh list
                if (selectedRoomId === roomId) {
                    selectedRoomId = null;
                    container.innerHTML = `
                        <div class="empty-state">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                <path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                            </svg>
                            <p>Select a room to view the game</p>
                        </div>
                    `;
                }
                return;
            }
            
            const monitor = GameMonitors[data.game_id];
            
            if (monitor) {
                container.innerHTML = monitor.render(data.state, data.ui_config);
                // 渲染完后，自动滚动 Action History 到最底部
                const timeline = document.getElementById('historyTimeline');
                if (timeline) {
                    timeline.scrollTop = timeline.scrollHeight;
                }
            } else {
                container.innerHTML = `
                    <div class="monitor-header">
                        <div class="monitor-title">
                            <h2>${data.game_id}</h2>
                            <span class="game-badge">Unknown Game</span>
                        </div>
                    </div>
                    <div class="monitor-body">
                        <pre style="background:var(--bg-secondary);padding:16px;border-radius:8px;overflow:auto;">
${JSON.stringify(data.state, null, 2)}
                        </pre>
                    </div>
                `;
            }
        }

        // Stats Page Functions
        async function searchPlayerStats() {
            const playerId = document.getElementById('playerIdInput').value.trim();
            const gameId = document.getElementById('gameSelect').value;
            
            if (!playerId) {
                alert('请输入玩家ID');
                return;
            }
            
            const stats = await fetchAPI(`/api/stats/player/${playerId}${gameId ? `?game_id=${gameId}` : ''}`);
            
            if (!stats || stats.error) {
                alert('未找到该玩家的战绩数据');
                return;
            }
            
            document.getElementById('playerStatsContainer').style.display = 'block';
            
            // Render stats grid
            const statsArray = Array.isArray(stats) ? stats : [stats];
            const statsData = statsArray[0];
            
            document.getElementById('playerStatsGrid').innerHTML = `
                <div class="player-stat-card">
                    <div class="stat-label">总场次</div>
                    <div class="stat-value blue">${statsData.total_games || 0}</div>
                </div>
                <div class="player-stat-card">
                    <div class="stat-label">胜场</div>
                    <div class="stat-value green">${statsData.wins || 0}</div>
                </div>
                <div class="player-stat-card">
                    <div class="stat-label">败场</div>
                    <div class="stat-value red">${statsData.losses || 0}</div>
                </div>
                <div class="player-stat-card">
                    <div class="stat-label">胜率</div>
                    <div class="stat-value gold">${statsData.win_rate || 0}%</div>
                </div>
                <div class="player-stat-card">
                    <div class="stat-label">净赢筹码</div>
                    <div class="stat-value ${statsData.net_chips >= 0 ? 'green' : 'red'}">${statsData.net_chips || 0}</div>
                </div>
                <div class="player-stat-card">
                    <div class="stat-label">最大赢</div>
                    <div class="stat-value green">${statsData.biggest_win || 0}</div>
                </div>
                <div class="player-stat-card">
                    <div class="stat-label">最大输</div>
                    <div class="stat-value red">${statsData.biggest_loss || 0}</div>
                </div>
                <div class="player-stat-card">
                    <div class="stat-label">场均筹码</div>
                    <div class="stat-value purple">${statsData.avg_chips_per_game || 0}</div>
                </div>
            `;
            
            // Load records
            await loadPlayerRecords(playerId, gameId);
        }

        async function loadPlayerRecords(playerId, gameId) {
            const records = await fetchAPI(`/api/stats/player/${playerId}/records${gameId ? `?game_id=${gameId}` : ''}`);
            
            if (!records || !records.records) {
                document.getElementById('recordsList').innerHTML = '<p style="color:var(--text-muted)">暂无历史记录</p>';
                return;
            }
            
            document.getElementById('recordsList').innerHTML = records.records.map(record => {
                const playerResult = record.players.find(p => p.player_id === playerId);
                const isWin = playerResult && playerResult.is_winner;
                
                return `
                    <div class="record-item">
                        <div class="record-header">
                            <span class="record-id">${record.room_id}</span>
                            <span class="record-result ${isWin ? 'win' : 'lose'}">${isWin ? '胜利' : '失败'}</span>
                        </div>
                        <div class="record-details">
                            <div class="record-detail-item">
                                <span class="record-detail-label">游戏</span>
                                <span class="record-detail-value">${record.game_name}</span>
                            </div>
                            <div class="record-detail-item">
                                <span class="record-detail-label">筹码变化</span>
                                <span class="record-detail-value" style="color: ${playerResult && playerResult.chips_change >= 0 ? 'var(--accent-green)' : 'var(--accent-red)'}">
                                    ${playerResult ? (playerResult.chips_change >= 0 ? '+' : '') + playerResult.chips_change : 0}
                                </span>
                            </div>
                            <div class="record-detail-item">
                                <span class="record-detail-label">底池</span>
                                <span class="record-detail-value">${record.final_pot}</span>
                            </div>
                            <div class="record-detail-item">
                                <span class="record-detail-label">时间</span>
                                <span class="record-detail-value">${new Date(record.ended_at).toLocaleString()}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function showStatsTab(tab) {
            document.querySelectorAll('.tabs .tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`.tabs .tab[onclick="showStatsTab('${tab}')"]`).classList.add('active');
            
            document.getElementById('recordsTab').style.display = tab === 'records' ? 'block' : 'none';
            document.getElementById('detailsTab').style.display = tab === 'details' ? 'block' : 'none';
        }

        // Leaderboard Page Functions
        async function loadLeaderboard() {
            const gameId = document.getElementById('leaderboardGameSelect').value;
            const leaderboard = await fetchAPI(`/api/stats/leaderboard/${gameId}?sort_by=${currentSortBy}`);
            
            if (!leaderboard || !leaderboard.leaderboard) {
                document.getElementById('leaderboardBody').innerHTML = '<tr><td colspan="6" style="text-align: center; color: var(--text-muted);">暂无数据</td></tr>';
                return;
            }
            
            document.getElementById('leaderboardBody').innerHTML = leaderboard.leaderboard.map(entry => {
                let rankClass = 'default';
                if (entry.rank === 1) rankClass = 'gold';
                else if (entry.rank === 2) rankClass = 'silver';
                else if (entry.rank === 3) rankClass = 'bronze';
                
                return `
                    <tr>
                        <td><span class="rank-badge ${rankClass}">${entry.rank}</span></td>
                        <td style="font-weight: 600;">${entry.player_id}</td>
                        <td>${entry.total_games}</td>
                        <td style="color: var(--accent-green);">${entry.wins}</td>
                        <td>${entry.win_rate}%</td>
                        <td style="color: ${entry.net_chips >= 0 ? 'var(--accent-green)' : 'var(--accent-red)'};">
                            ${entry.net_chips >= 0 ? '+' : ''}${entry.net_chips}
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function sortLeaderboard(sortBy) {
            currentSortBy = sortBy;
            
            document.querySelectorAll('.sort-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.sort-btn[onclick="sortLeaderboard('${sortBy}')"]`).classList.add('active');
            
            loadLeaderboard();
        }

        function startAutoRefresh() {
            if (refreshInterval) clearInterval(refreshInterval);
            refreshInterval = setInterval(() => {
                if (currentPage === 'monitor') {
                    refreshAll();
                }
            }, 2000);
        }

        document.addEventListener('DOMContentLoaded', () => {
            refreshAll();
            startAutoRefresh();
        });
    </script>
</body>
</html>
